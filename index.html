<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naktis Mokykloje</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body {
            margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif;
            background: url('fonas.gif') no-repeat center center fixed;
            background-size: cover; color: white; display: flex; justify-content: center; min-height: 100vh;
        }
        .container { width: 100%; max-width: 500px; padding: 20px; text-align: center; }
        .logo-img { max-width: 90%; height: auto; mix-blend-mode: screen; margin-bottom: 20px; }
        .card {
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(8px);
            padding: 30px; border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }
        .menu-btn {
            background: transparent; border: 2px solid white; color: white;
            padding: 15px; margin: 12px 0; width: 100%; border-radius: 12px;
            font-size: 16px; font-weight: bold; cursor: pointer; text-transform: uppercase;
            transition: 0.3s;
        }
        .menu-btn:hover { background: white; color: black; }
        input, textarea { 
            width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; 
            border: 1px solid white; background: transparent; color: white; 
            text-align: center; font-size: 16px; outline: none;
        }
        textarea { height: 80px; text-align: left; }
        .hidden { display: none; }
        #reader { border-radius: 15px; overflow: hidden; border: 2px solid white !important; margin-bottom: 10px; background: black; }
        .status-badge { padding: 10px; border-radius: 8px; margin-bottom: 15px; background: rgba(239, 68, 68, 0.2); color: #ef4444; border: 1px solid #ef4444; font-weight: bold; }
        .unlocked { background: rgba(34, 197, 94, 0.2); color: #22c55e; border: 1px solid #22c55e; }
        .sponsors { margin-top: 40px; font-size: 12px; text-transform: uppercase; opacity: 0.6; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.jpg" class="logo-img">

    <div class="card">
        <div id="main-menu">
            <button class="menu-btn" onclick="showSection('team-selection')">Pasirinkti komandą</button>
            <button class="menu-btn" onclick="showSection('admin-login')">GŠG Mokinių taryba</button>
            <button class="menu-btn" onclick="showSection('qr-generator')">QR kodų darymas</button>
        </div>

        <div id="team-selection" class="hidden">
            <h3>Įrašykite pavadinimą</h3>
            <input type="text" id="team-name-input" placeholder="KOMANDOS VARDAS">
            <button class="menu-btn" onclick="startQuiz()">PRADĖTI</button>
            <button onclick="showSection('main-menu')" style="background:none; border:none; color:white; cursor:pointer;">Atgal</button>
        </div>

        <div id="quiz-step" class="hidden">
            <div id="lock-status" class="status-badge">🔒 RASKITE QR KODĄ</div>
            <div id="scanner-container" class="hidden">
                <div id="reader"></div>
                <button class="menu-btn" onclick="stopScanner()">Atšaukti</button>
            </div>
            <div id="quiz-content" class="hidden">
                <p id="riddle-text" style="font-size: 1.1em; margin-bottom: 20px; font-weight: bold;"></p>
                <input type="text" id="ans-input" placeholder="Atsakymas...">
                <button class="menu-btn" onclick="checkAnswer()">Tikrinti</button>
            </div>
            <button id="open-scanner-btn" class="menu-btn" style="background: white; color: black;" onclick="startScanner()">📷 SKENUOTI KODĄ</button>
            <div id="next-loc" class="hidden">
                <h3 style="color: #22c55e;">TEISINGAI! ✅</h3>
                <p>Kita stotelė:</p>
                <p id="location-text" style="font-weight: bold; color: #60a5fa;"></p>
                <button class="menu-btn" onclick="prepareNext()">EITI TOLIAU</button>
            </div>
        </div>

        <div id="finish-step" class="hidden">
            <h2 style="color: #22c55e;">🎉 FINIŠAS!</h2>
            <p>Sveikiname įveikus visas mįsles.</p>
            <hr style="border: 0.5px solid rgba(255,255,255,0.2); margin: 20px 0;">
            
            <p style="font-size: 0.9em;">Palikite tarybai pranešimą (nebūtina):</p>
            <form action="https://formspree.io/f/mojklbzq" method="POST">
                <input type="hidden" name="Statusas" value="KOMANDA BAIGĖ ŽAIDIMĄ">
                <input type="email" name="El_pastas" placeholder="Jūsų el. paštas (nebūtina)">
                <textarea name="zinute" placeholder="Jūsų atsiliepimas arba komandos vardas..."></textarea>
                <button type="submit" class="menu-btn" style="background: #22c55e; border-color: #22c55e;">SIŲSTI TARYBAI</button>
            </form>
            <button onclick="location.reload()" style="background:none; border:none; color:white; cursor:pointer; margin-top:10px;">Grįžti į pradžią</button>
        </div>

        <div id="admin-login" class="hidden">
            <h3>TARYBOS LOGIN</h3>
            <input type="text" id="admin-user" placeholder="Vartotojas">
            <input type="password" id="admin-pass" placeholder="Slaptažodis">
            <button class="menu-btn" onclick="checkAdmin()">PRISIJUNGTI</button>
            <button class="menu-btn" onclick="showSection('main-menu')">ATGAL</button>
        </div>

        <div id="admin-panel" class="hidden">
            <h3>LOKALŪS REZULTATAI</h3>
            <div id="results-list" style="text-align: left; margin-bottom: 20px;"></div>
            <button class="menu-btn" onclick="showSection('main-menu')">ATSIJUNGTI</button>
        </div>

        <div id="qr-generator" class="hidden">
            <h3>QR KŪRIMAS</h3>
            <input type="text" id="qr-url" placeholder="Raktinis žodis">
            <button class="menu-btn" onclick="generateQR()">GENERUOTI</button>
            <div id="qrcode" style="background: white; padding: 10px; display: inline-block; margin-top: 10px; border-radius: 5px;"></div>
            <button class="menu-btn" onclick="showSection('main-menu')">ATGAL</button>
        </div>
    </div>

    <div class="sponsors">Pagrindiniai rėmėjai: <b>GŠG Taryba</b></div>
</div>

<script>
    let currentTeam = "";
    let qIdx = 0;
    let scanner;
    let gameResults = JSON.parse(localStorage.getItem('gsg_results')) || {};

    const quizData = [
        { q: "Aš turiu šimtus lapų, bet nesu medis?", a: "knyga", key: "kodas1", loc: "Biblioteka" },
        { q: "Aš turiu tinklą, bet žuvies negaudau?", a: "krepsinis", key: "kodas2", loc: "Sporto salė" },
        { q: "Kuo daugiau atimi, tuo didesnis?", a: "duobe", key: "kodas3", loc: "Rūbinė" }
    ];

    function showSection(id) {
        document.querySelectorAll('.card > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startQuiz() {
        currentTeam = document.getElementById('team-name-input').value;
        if(!currentTeam) return alert("Įveskite pavadinimą!");
        showSection('quiz-step');
        prepareNext();
    }

    // --- FONINIS SIUNTIMAS (Formspree API) ---
    function siustiRezultata(komanda, taskas) {
        fetch("https://formspree.io/f/mojklbzq", {
            method: "POST",
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ 
                Komanda: komanda, 
                Taskas: taskas,
                Tipas: "Automatinis progresas"
            })
        });
    }

    function checkAnswer() {
        const val = document.getElementById('ans-input').value.toLowerCase().trim();
        if(val === quizData[qIdx].a) {
            siustiRezultata(currentTeam, qIdx + 1);
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-loc').classList.remove('hidden');
            document.getElementById('location-text').innerText = quizData[qIdx].loc;
            gameResults[currentTeam] = (gameResults[currentTeam] || 0) + 1;
            localStorage.setItem('gsg_results', JSON.stringify(gameResults));
        } else {
            alert("Neteisingas atsakymas!");
        }
    }

    // --- SKENAVIMAS ---
    function startScanner() {
        document.getElementById('scanner-container').classList.remove('hidden');
        document.getElementById('open-scanner-btn').classList.add('hidden');
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                if(decodedText.trim() === quizData[qIdx].key) {
                    unlockQuestion();
                    stopScanner();
                } else { alert("Netinkamas kodas!"); }
            }
        ).catch(err => alert("Kameros klaida!"));
    }

    function stopScanner() {
        if(scanner) {
            scanner.stop().then(() => {
                document.getElementById('scanner-container').classList.add('hidden');
                document.getElementById('open-scanner-btn').classList.remove('hidden');
            });
        }
    }

    function unlockQuestion() {
        const status = document.getElementById('lock-status');
        status.innerText = "🔓 ATRAKINTA";
        status.className = "status-badge unlocked";
        document.getElementById('quiz-content').classList.remove('hidden');
        document.getElementById('riddle-text').innerText = quizData[qIdx].q;
        document.getElementById('open-scanner-btn').classList.add('hidden');
    }

    function prepareNext() {
        if(qIdx >= quizData.length - 1 && !document.getElementById('next-loc').classList.contains('hidden')) {
            showSection('finish-step');
            return;
        }
        if(!document.getElementById('next-loc').classList.contains('hidden')) qIdx++;
        document.getElementById('next-loc').classList.add('hidden');
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('open-scanner-btn').classList.remove('hidden');
        const status = document.getElementById('lock-status');
        status.innerText = "🔒 RASKITE QR KODĄ";
        status.className = "status-badge";
        document.getElementById('ans-input').value = "";
    }

    function checkAdmin() {
        if(document.getElementById('admin-user').value === "admin" && document.getElementById('admin-pass').value === "gsg2026") {
            renderResults();
            showSection('admin-panel');
        } else { alert("Klaida!"); }
    }

    function renderResults() {
        const list = document.getElementById('results-list');
        list.innerHTML = "";
        for (let t in gameResults) {
            list.innerHTML += `<div style="padding:10px; border-bottom:1px solid #444">${t}: ${gameResults[t]} taškai</div>`;
        }
    }

    function generateQR() {
        const txt = document.getElementById('qr-url').value;
        if(!txt) return;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: txt, width: 128, height: 128 });
    }
</script>
</body>
</html>
