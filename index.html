<!DOCTYPE html>
<html lang="lt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GŠG Naktis Mokykloje</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        :root { --primary: #2563eb; --success: #22c55e; --bg: #f8fafc; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; }
        .hidden { display: none; }
        button { width: 100%; padding: 14px; margin: 10px 0; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; font-size: 16px; transition: 0.2s; }
        .action-btn { background: var(--primary); color: white; }
        .scan-btn { background: #334155; color: white; }
        input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        
        #reader { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 10px; }
        .status-badge { padding: 8px; border-radius: 8px; font-size: 14px; margin-bottom: 15px; background: #fee2e2; color: #ef4444; font-weight: bold; }
        .unlocked { background: #dcfce7; color: #166534; }
    </style>
</head>
<body>

<div class="card">
    <div id="main-menu">
        <h2 style="color: var(--primary)">🏫 GŠG Nuotykis</h2>
        <button class="action-btn" onclick="showSection('team-selection')">Pradėti žaidimą</button>
        <button style="background:#e2e8f0; color:#475569" onclick="showSection('admin-login')">Tarybai</button>
        <button style="background:#e2e8f0; color:#475569" onclick="showSection('qr-generator')">QR kūrimas</button>
    </div>

    <div id="team-selection" class="hidden">
        <h3>Pasirinkite komandą</h3>
        <input type="text" id="team-name-input" placeholder="Įrašykite pavadinimą...">
        <button class="action-btn" onclick="startQuiz()">Toliau</button>
    </div>

    <div id="quiz-step" class="hidden">
        <div id="lock-status" class="status-badge">🔒 Klausimas užrakintas. Raskite QR kodą!</div>
        
        <div id="scanner-container" class="hidden">
            <div id="reader"></div>
            <button onclick="stopScanner()" style="background:#64748b; color:white">Atšaukti</button>
        </div>

        <div id="quiz-content" class="hidden">
            <h3 id="riddle-text">Mįslė pasirodys čia...</h3>
            <input type="text" id="ans-input" placeholder="Jūsų atsakymas...">
            <button class="action-btn" onclick="checkAnswer()">Tikrinti</button>
        </div>

        <button id="open-scanner-btn" class="scan-btn" onclick="startScanner()">📷 Skenuoti QR kodą</button>

        <div id="next-loc" class="hidden" style="background:#f0f9ff; padding:15px; border-radius:10px; margin-top:15px">
            <p>✅ Teisingai! Kita vieta:</p>
            <strong id="location-text"></strong>
            <button class="action-btn" onclick="prepareNext()">Eiti toliau</button>
        </div>
    </div>

    <div id="admin-login" class="hidden">...</div>
    <div id="qr-generator" class="hidden">
        <h3>QR Kūrėjas</h3>
        <p>Užkoduokite tekstą, kuris atrakins klausimą (pvz: raktas1)</p>
        <input type="text" id="qr-url" placeholder="Raktinis žodis">
        <button class="action-btn" onclick="generateQR()">Sukurti</button>
        <div id="qrcode" style="margin-top:15px"></div>
        <button onclick="showSection('main-menu')">Atgal</button>
    </div>
</div>

<script>
    let currentTeam = "";
    let qIdx = 0;
    let scanner;

    // KONFIGŪRACIJA: q-klausimas, a-atsakymas, key-QR kodo tekstas, loc-kur eiti toliau
    const quizData = [
        { q: "Aš turiu šimtus lapų, bet nesu medis?", a: "knyga", key: "startas123", loc: "Prie valgyklos durų" },
        { q: "Aš turiu tinklą, bet žuvies negaudau?", a: "krepsinis", key: "sportas99", loc: "Antrame aukšte prie akvariumo" }
    ];

    function showSection(id) {
        document.querySelectorAll('.card > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(id).classList.remove('hidden');
    }

    function startQuiz() {
        currentTeam = document.getElementById('team-name-input').value;
        if(!currentTeam) return alert("Įveskite pavadinimą!");
        showSection('quiz-step');
        prepareNext();
    }

    function startScanner() {
        document.getElementById('scanner-container').classList.remove('hidden');
        document.getElementById('open-scanner-btn').classList.add('hidden');
        
        scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            (decodedText) => {
                if(decodedText === quizData[qIdx].key) {
                    unlockQuestion();
                    stopScanner();
                } else {
                    alert("Netinkamas kodas! Ieškokite kito.");
                }
            }
        ).catch(err => alert("Kameros klaida. Patikrinkite leidimus."));
    }

    function stopScanner() {
        if(scanner) {
            scanner.stop().then(() => {
                document.getElementById('scanner-container').classList.add('hidden');
                document.getElementById('open-scanner-btn').classList.remove('hidden');
            });
        }
    }

    function unlockQuestion() {
        const status = document.getElementById('lock-status');
        status.innerText = "🔓 Klausimas atrakintas!";
        status.className = "status-badge unlocked";
        document.getElementById('quiz-content').classList.remove('hidden');
        document.getElementById('riddle-text').innerText = quizData[qIdx].q;
        document.getElementById('open-scanner-btn').classList.add('hidden');
    }

    function checkAnswer() {
        const val = document.getElementById('ans-input').value.toLowerCase().trim();
        if(val === quizData[qIdx].a) {
            document.getElementById('quiz-content').classList.add('hidden');
            document.getElementById('next-loc').classList.remove('hidden');
            document.getElementById('location-text').innerText = quizData[qIdx].loc;
        } else {
            alert("Neteisingas atsakymas!");
        }
    }

    function prepareNext() {
        if(qIdx >= quizData.length - 1 && document.getElementById('next-loc').classList.contains('hidden') === false) {
            alert("Sveikiname baigus!");
            location.reload();
            return;
        }
        if(!document.getElementById('next-loc').classList.contains('hidden')) {
            qIdx++;
        }
        document.getElementById('next-loc').classList.add('hidden');
        document.getElementById('quiz-content').classList.add('hidden');
        document.getElementById('open-scanner-btn').classList.remove('hidden');
        const status = document.getElementById('lock-status');
        status.innerText = "🔒 Klausimas užrakintas. Raskite QR kodą!";
        status.className = "status-badge";
        document.getElementById('ans-input').value = "";
    }

    // QR Kodo generavimas (adminui)
    function generateQR() {
        const txt = document.getElementById('qr-url').value;
        document.getElementById('qrcode').innerHTML = "";
        new QRCode(document.getElementById("qrcode"), { text: txt, width: 128, height: 128 });
    }
</script>
</body>
</html>
